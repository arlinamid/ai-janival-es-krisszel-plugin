name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (dist only)
        run: node scripts/release.js --dist-only

      - name: Get version from manifest
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Package zip
        run: node scripts/release.js

      - name: Update updates.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="arlinamid/ai-janival-es-krisszel-plugin"
          ZIP_URL="https://github.com/${REPO}/releases/download/v${VERSION}/ai-janival-es-krisszel-plugin-v${VERSION}.zip"
          EXT_ID=$(grep -o 'appid="[^"]*"' updates.xml | sed 's/appid="//;s/"//' || echo "EXTENSION_ID_HERE")
          cat > updates.xml <<EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='${EXT_ID}'>
              <updatecheck codebase='${ZIP_URL}' version='${VERSION}' />
            </app>
          </gupdate>
          EOF

      - name: Commit updated updates.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.xml
          git diff --staged --quiet || git commit -m "chore: updates.xml → v${{ steps.version.outputs.version }}"
          git push origin HEAD:master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md
          files: releases/ai-janival-es-krisszel-plugin-v${{ steps.version.outputs.version }}.zip
          make_latest: true
